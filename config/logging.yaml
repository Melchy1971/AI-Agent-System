version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)-8s] %(name)s: %(message)s"
    datefmt: "%H:%M:%S"
  minimal:
    format: "[%(levelname)s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stdout

root:
  level: WARNING
  handlers: [console]

loggers:
  agent.core.agent:
    level: DEBUG
    propagate: false
    handlers: [console]
  agent.core.planner:
    level: DEBUG
    propagate: false
    handlers: [console]
  agent.core.executor:
    level: DEBUG
    propagate: false
    handlers: [console]
  agent.tools:
    level: INFO
    propagate: false
    handlers: [console]
